name: deploy-frontend-prod

# Frontend (S3 + CloudFront) を prod 環境にデプロイする。
#
# トリガー: release/frontend-prod/<version> タグの push、または workflow_dispatch (ロールバック用).
# 流れ:
#   1) OIDC で AssumeRole (prod environment の承認後に実行)
#   2) pnpm build:prod でフロントエンドをビルド
#   3) sam deploy で S3 / CloudFront を作成・更新
#      (Backend Function URL は SSM /tasche/prod/sam/backend-function-url から自動取得)
#   4) S3 sync → CloudFront invalidation
#
# 前提:
#   - GitHub "prod" environment に AWS_DEPLOY_ROLE_ARN_PROD が設定済みであること
#   - 外部リポで prod 向け SSM パラメータ・ACM・Route53 が整備済みであること
#     (docs/deploy/external-repo-requirements.md を参照)
#   - 初回デプロイ後、CloudFormation Outputs の DistributionId を
#     packages/backend/infra/samconfig.toml の prod.CloudFrontDistributionId に設定すること
on:
  push:
    tags:
      - "release/frontend-prod/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "デプロイするコミット/タグ (空なら main)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ap-southeast-1
      ENV_NAME: prod
      FRONTEND_STACK_NAME: prod-tasche-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: packages/frontend
        run: pnpm build:prod

      - name: Deploy frontend stack
        working-directory: packages/frontend/infra
        run: |
          sam deploy \
            --config-env prod \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Deploy CloudFront alarms (us-east-1)
        working-directory: packages/frontend/infra
        run: |
          sam deploy \
            --template-file template-cloudfront-alarms.yaml \
            --config-file samconfig-cloudfront-alarms.toml \
            --config-env prod \
            --region us-east-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Sync assets to S3 & invalidate CloudFront
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AssetsBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          # ハッシュ付き静的アセット (assets/) は長期キャッシュ
          aws s3 sync packages/frontend/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"

          # HTML はキャッシュさせない (即時切替のため)
          aws s3 sync packages/frontend/dist/ "s3://$BUCKET/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/index.html" "/"

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --output table
