name: deploy-frontend-dev

# Frontend (S3 + CloudFront) を dev 環境にデプロイする。
#
# トリガー: release/frontend-dev/<version> タグの push、または workflow_dispatch (ロールバック用).
# 流れ:
#   1) OIDC で AssumeRole
#   2) sam deploy で S3 / CloudFront を作成・更新
#      (Backend Function URL は SSM /tasche/dev/sam/backend-function-url から自動取得)
#   3) pnpm build → S3 sync → CloudFront invalidation
on:
  push:
    tags:
      - "release/frontend-dev/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "デプロイするコミット/タグ (空なら main)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ap-southeast-1
      ENV_NAME: dev
      FRONTEND_STACK_NAME: dev-tasche-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v2
        with:
          use-installer: true

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: packages/frontend
        run: pnpm build:dev

      - name: Deploy frontend stack
        working-directory: packages/frontend/infra
        run: |
          sam deploy \
            --config-env dev \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Deploy CloudFront alarms (us-east-1)
        working-directory: packages/frontend/infra
        run: |
          sam deploy \
            --template-file template-cloudfront-alarms.yaml \
            --config-file samconfig-cloudfront-alarms.toml \
            --config-env dev \
            --region us-east-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Sync assets to S3 & invalidate CloudFront
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='AssetsBucketName'].OutputValue" \
            --output text)
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" \
            --output text)

          # ハッシュ付き静的アセット (assets/) は長期キャッシュ
          aws s3 sync packages/frontend/dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.html"

          # HTML はキャッシュさせない (即時切替のため)
          aws s3 sync packages/frontend/dist/ "s3://$BUCKET/" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/index.html" "/"

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$FRONTEND_STACK_NAME" \
            --query "Stacks[0].Outputs" \
            --output table
