name: frontend-ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - packages/frontend/**
      - packages/backend/openapi.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - package.json
      - .github/workflows/frontend-ci.yml
      - .github/workflows/reusable-node-pnpm-run.yml
  push:
    branches:
      - main
    paths:
      - packages/frontend/**
      - packages/backend/openapi.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - package.json
      - .github/workflows/frontend-ci.yml
      - .github/workflows/reusable-node-pnpm-run.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-lint:
    name: frontend-lint
    uses: ./.github/workflows/reusable-node-pnpm-run.yml
    with:
      node-version: 24.x
      pnpm-version: "11"
      cache-dependency-path: pnpm-lock.yaml
      script: pnpm --filter @tasche/frontend lint

  frontend-test:
    name: frontend-test
    uses: ./.github/workflows/reusable-node-pnpm-run.yml
    with:
      node-version: 24.x
      pnpm-version: "11"
      cache-dependency-path: pnpm-lock.yaml
      script: pnpm --filter @tasche/frontend test

  frontend-build:
    name: frontend-build
    uses: ./.github/workflows/reusable-node-pnpm-run.yml
    with:
      node-version: 24.x
      pnpm-version: "11"
      cache-dependency-path: pnpm-lock.yaml
      script: pnpm --filter @tasche/frontend build

  frontend-openapi:
    name: frontend-openapi
    uses: ./.github/workflows/reusable-node-pnpm-run.yml
    with:
      node-version: 24.x
      pnpm-version: "11"
      cache-dependency-path: pnpm-lock.yaml
      script: |
        pnpm --filter @tasche/frontend openapi:update
        changes=$(git status --porcelain -- packages/frontend/src/api/generated)
        if [[ -n "$changes" ]]; then
          echo "OpenAPI generated files are out of date. Run the following command and commit the results:" >&2
          echo "  pnpm --filter @tasche/frontend openapi:update" >&2
          echo "" >&2
          echo "$changes" >&2
          exit 1
        fi

  frontend-e2e:
    name: frontend-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: test-backend
      DB_CONTAINER_PORT: 5432
      API_CONTAINER_PORT: 8000
      E2E_API_CONTAINER_PORT: 8001
      VITE_DEV_PORT: 5173
      VITE_API_BASE_URL: http://localhost:8001
      E2E_API_BASE_URL: http://localhost:8001
      VITE_AUTH_STUB_ENABLED: "true"
      PLAYWRIGHT_HTML_OPEN: never
      AUTH_STUB_JWT_SECRET: ${{ secrets.AUTH_STUB_JWT_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "11"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browsers from Docker image
        run: |
          mkdir -p $HOME/.cache/ms-playwright
          docker run --rm \
            -v $HOME/.cache/ms-playwright:/dest \
            mcr.microsoft.com/playwright:v1.61.1-noble \
            bash -c "cp -rp /ms-playwright/. /dest/ && chown -R $(id -u):$(id -g) /dest"

      - name: Start backend containers
        run: docker compose -f compose.yaml up -d db api-e2e
        working-directory: packages/backend

      - name: Run backend migrations
        run: docker compose -f compose.yaml exec -T api-e2e alembic upgrade head
        working-directory: packages/backend

      - name: Reset E2E backend data
        run: docker compose -f compose.yaml exec -T api-e2e python scripts/e2e_seed/reset.py
        working-directory: packages/backend

      - name: Seed E2E backend data
        run: docker compose -f compose.yaml exec -T api-e2e python scripts/e2e_seed/run.py
        working-directory: packages/backend

      - name: Run E2E Tests
        run: pnpm --filter @tasche/frontend test:e2e

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30
