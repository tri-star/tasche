name: backend-ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - packages/backend/**
      - .github/workflows/backend-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v7
        with:
          enable-cache: true
          working-directory: packages/backend
          uv-version: "latest"

      - name: Create venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format . --check

      - name: Check Alembic has single head
        run: |
          heads="$(uv run alembic heads)"
          count="$(printf '%s\n' "$heads" | sed '/^[[:space:]]*$/d' | wc -l)"
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly one Alembic head, but found $count:" >&2
            printf '%s\n' "$heads" >&2
            exit 1
          fi

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: tasche_test
          POSTGRES_USER: tasche
          POSTGRES_PASSWORD: tasche_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tasche -d tasche_test" --health-interval
          10s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@localhost:5432/tasche_test
      TEST_DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@localhost:5432/tasche_test
      # TCH-75: JWT 方式廃止に伴い JWT_SECRET/TEST_JWT_SECRET を削除。
      # stub-login エンドポイントを有効化するために AUTH_STUB_ENABLED を設定。
      AUTH_STUB_ENABLED: "true"
      ENABLE_TEST_AUTH: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v7
        with:
          enable-cache: true
          working-directory: packages/backend
          uv-version: "latest"

      - name: Create venv
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Wait for Postgres
        env:
          PGPASSWORD: tasche_dev_password
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for i in {1..60}; do
            pg_isready -h localhost -p 5432 -U tasche -d tasche_test && exit 0
            sleep 1
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Run tests
        run: timeout 10m uv run pytest
