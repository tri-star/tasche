name: reusable-node-pnpm-run

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version passed to actions/setup-node
        required: false
        type: string
        default: 24.x
      pnpm-version:
        description: pnpm version passed to pnpm/action-setup
        required: false
        type: string
        default: "9"
      cache-dependency-path:
        description: Path used for pnpm cache key (usually pnpm-lock.yaml)
        required: false
        type: string
        default: pnpm-lock.yaml
      script:
        description: Shell script to run after installing dependencies
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # NOTE:
      # - actions/setup-node's `cache: pnpm` calls `pnpm` internally.
      # - Therefore pnpm must be installed BEFORE actions/setup-node when caching is enabled.
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.cache-dependency-path }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run
        shell: bash
        run: ${{ inputs.script }}
