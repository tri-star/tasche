name: PR AI Review

on:
  pull_request_target:
    types:
      - opened
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number'
        required: true
      head_sha:
        description: 'HEAD SHA'
        required: true
      base_sha:
        description: 'Base SHA'
        required: true
      head_ref:
        description: 'HEAD branch ref'
        required: true
      base_ref:
        description: 'Base branch ref'
        required: true
      head_repo:
        description: 'HEAD repository (owner/repo)'
        required: true
      pr_title:
        description: 'PR title'
        required: true
      pr_author:
        description: 'PR author username'
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pr-ai-review:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      TRUSTED_REF: ${{ github.event.repository.default_branch }}
    steps:
      - name: Resolve PR context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PR_NUMBER=${{ inputs.pr_number }}"    >> $GITHUB_ENV
            echo "PR_TITLE=${{ inputs.pr_title }}"      >> $GITHUB_ENV
            echo "PR_AUTHOR=${{ inputs.pr_author }}"    >> $GITHUB_ENV
            echo "BASE_REF=${{ inputs.base_ref }}"      >> $GITHUB_ENV
            echo "BASE_SHA=${{ inputs.base_sha }}"      >> $GITHUB_ENV
            echo "HEAD_REF=${{ inputs.head_ref }}"      >> $GITHUB_ENV
            echo "HEAD_SHA=${{ inputs.head_sha }}"      >> $GITHUB_ENV
            echo "HEAD_REPO=${{ inputs.head_repo }}"    >> $GITHUB_ENV
            if [ "${{ inputs.head_repo }}" = "${{ github.repository }}" ]; then
              echo "SAME_REPO=true" >> $GITHUB_ENV
            else
              echo "SAME_REPO=false" >> $GITHUB_ENV
            fi
          else
            echo "PR_NUMBER=${{ github.event.pull_request.number }}"               >> $GITHUB_ENV
            echo "PR_TITLE=${{ github.event.pull_request.title }}"                >> $GITHUB_ENV
            echo "PR_AUTHOR=${{ github.event.pull_request.user.login }}"          >> $GITHUB_ENV
            echo "BASE_REF=${{ github.event.pull_request.base.ref }}"             >> $GITHUB_ENV
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}"             >> $GITHUB_ENV
            echo "HEAD_REF=${{ github.event.pull_request.head.ref }}"             >> $GITHUB_ENV
            echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}"             >> $GITHUB_ENV
            echo "HEAD_REPO=${{ github.event.pull_request.head.repo.full_name }}" >> $GITHUB_ENV
            if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
              echo "SAME_REPO=true" >> $GITHUB_ENV
            else
              echo "SAME_REPO=false" >> $GITHUB_ENV
            fi
          fi

      - name: Parse ID Token
        id: parse_id_token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com')
            const [, payload] = token.split('.')
            const claimsJson = Buffer.from(payload, 'base64').toString('utf8')
            const claims = JSON.parse(claimsJson)
            core.info(`OIDC claims: ${JSON.stringify(claims, null, 2)}`)

      - name: Checkout trusted workflow base
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TRUSTED_REF }}
          fetch-depth: 0

      - name: Fetch exact base/head commits
        if: env.SAME_REPO == 'true'
        run: |
          git fetch --no-tags origin \
            "refs/heads/${BASE_REF}:refs/remotes/origin/pr-review-base" \
            "refs/heads/${HEAD_REF}:refs/remotes/origin/pr-review-head"
          git fetch --no-tags origin "${BASE_SHA}" "${HEAD_SHA}"
          git rev-parse --verify "${BASE_SHA}^{commit}"
          git rev-parse --verify "${HEAD_SHA}^{commit}"

      - name: Set up Node.js
        if: env.SAME_REPO == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Copilot CLI
        if: env.SAME_REPO == 'true'
        run: npm install -g @github/copilot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: env.SAME_REPO == 'true'
        run: python -m pip install pyyaml

      - name: Write PR body
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p tmp/review
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""' > tmp/review/pr-body.txt
          else
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          body = event["pull_request"].get("body") or ""
          Path("tmp/review/pr-body.txt").write_text(body)
          PY
          fi

      - name: Build review context
        if: env.SAME_REPO == 'true'
        run: |
          python3 .github/skills/review-context/scripts/build_review_context.py \
            --base-ref "${BASE_REF}" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --trusted-ref "${TRUSTED_REF}" \
            --repo "${REPO}" \
            --head-repo "${HEAD_REPO}" \
            --pr-number "${PR_NUMBER}" \
            --title "${PR_TITLE}" \
            --body-file tmp/review/pr-body.txt \
            --author "${PR_AUTHOR}" \
            --output-dir tmp/review

      - name: Check S3 upload config
        id: s3-check
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AI_REVIEW_S3_BUCKET: ${{ secrets.AI_REVIEW_S3_BUCKET }}
        run: |
          if [ "${SAME_REPO}" = "true" ] && [ -n "${AWS_ROLE_ARN}" ] && [ -n "${AI_REVIEW_S3_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.s3-check.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Fetch review rules from S3
        if: steps.s3-check.outputs.enabled == 'true'
        continue-on-error: true
        env:
          AI_REVIEW_S3_BUCKET: ${{ secrets.AI_REVIEW_S3_BUCKET }}
        run: |
          python3 .github/scripts/fetch_review_rules.py \
            --metadata tmp/review/pr-metadata.json \
            --bucket "${AI_REVIEW_S3_BUCKET}" \
            --output tmp/review/rules.json

      - name: Build Copilot prompt
        if: env.SAME_REPO == 'true'
        run: |
          RULES_ARG=""
          if [ -f tmp/review/rules.json ]; then
            RULES_ARG="--rules tmp/review/rules.json"
          fi
          python3 .github/scripts/build_pr_review_prompt.py \
            --metadata tmp/review/pr-metadata.json \
            --body-file tmp/review/pr-body.txt \
            --output tmp/review/prompt.txt \
            ${RULES_ARG}

      - name: Run Copilot review
        if: env.SAME_REPO == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot \
            -s \
            --no-ask-user \
            --agent=pr-review \
            --prompt "$(cat tmp/review/prompt.txt)" \
            --allow-tool='shell(git:diff), shell(git:show), shell(git:rev-parse), shell(rg:*), shell(cat:*), shell(sed:*), shell(ls:*)' \
            --secret-env-vars='COPILOT_GITHUB_TOKEN,GH_TOKEN,GITHUB_TOKEN' \
            > tmp/review/result.raw.txt

      - name: Create fallback result for fork PR
        if: env.SAME_REPO != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = {
              "verdict": "human-review",
              "confidence": 1,
              "reasons": [
                  "Fork PR は trusted workflow で PR head を安全に参照し切れないため、AI review を実行せず human-review とした。"
              ],
              "violated_docs": [],
              "referenced_paths": [".github/workflows/pr-ai-review.yml"],
              "review_comments": [],
              "summary_comments": [],
              "posted_summary_comments": [],
          }
          Path("tmp/review/result.json").write_text(
              json.dumps(result, indent=2, ensure_ascii=False)
          )
          PY

      - name: Normalize review result
        if: env.SAME_REPO == 'true'
        run: |
          RULES_ARG=""
          if [ -f tmp/review/rules.json ]; then
            RULES_ARG="--rules tmp/review/rules.json"
          fi
          python3 .github/scripts/validate_pr_review_result.py \
            --input tmp/review/result.raw.txt \
            --output tmp/review/result.json \
            ${RULES_ARG}

      - name: Render summary comment
        run: |
          python3 .github/scripts/render_pr_review_comment.py \
            --input tmp/review/result.json \
            --output tmp/review/summary-comment.md

      - name: Ensure AI review labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ai-verdict:mergeable" --repo "${REPO}" --color "0e8a16" --description "AI verdict: mergeable" 2>/dev/null || true
          gh label create "ai-verdict:human-review" --repo "${REPO}" --color "d93f0b" --description "AI verdict: human review required" 2>/dev/null || true

      - name: Update verdict labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_labels=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json labels --jq '.labels[].name')
          for label in ai-verdict:mergeable ai-verdict:human-review; do
            if printf '%s\n' "${current_labels}" | grep -qx "${label}"; then
              gh pr edit "${PR_NUMBER}" --repo "${REPO}" --remove-label "${label}"
            fi
          done

          verdict=$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("tmp/review/result.json").read_text())["verdict"])
          PY
          )

          if [ "${verdict}" = "mergeable" ]; then
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "ai-verdict:mergeable"
          else
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "ai-verdict:human-review"
          fi

      - name: Upsert summary comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          comment_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- ai-pr-review-summary -->")) | .id' | head -n 1)

          body=$(cat tmp/review/summary-comment.md)

          if [ -n "${comment_id}" ]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${comment_id}" -f body="${body}" >/dev/null
          else
            gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${body}" >/dev/null
          fi

      - name: Delete existing persistent summary comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.body | contains("<!-- ai-pr-review-summary-persistent -->")) | .id' |
          while read -r comment_id; do
            if [ -n "${comment_id}" ]; then
              gh api --method DELETE "repos/${REPO}/issues/comments/${comment_id}" >/dev/null
            fi
          done

      - name: Post persistent summary comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/render_persistent_summary_comments.py \
            --input tmp/review/result.json \
            --output tmp/review/persistent-summary-comments.json \
            --repo "${REPO}" \
            --pr-number "${PR_NUMBER}" \
            --head-sha "${HEAD_SHA}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-attempt "${GITHUB_RUN_ATTEMPT}"

          : > tmp/review/posted-summary-comments.jsonl
          jq -c '.[]' tmp/review/persistent-summary-comments.json | while read -r item; do
            body=$(printf '%s' "${item}" | jq -r '.body')
            response=$(gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${body}")
            jq -c -n \
              --argjson item "${item}" \
              --argjson response "${response}" \
              '{
                summary_index: $item.summary_index,
                comment_id: $response.id,
                node_id: $response.node_id,
                html_url: $response.html_url,
                severity: $item.severity,
                category: $item.category
              }' >> tmp/review/posted-summary-comments.jsonl
          done

          python3 - <<'PY'
          import json
          from pathlib import Path

          result_path = Path("tmp/review/result.json")
          posted_path = Path("tmp/review/posted-summary-comments.jsonl")

          result = json.loads(result_path.read_text())
          posted = []
          if posted_path.exists():
              posted = [
                  json.loads(line)
                  for line in posted_path.read_text().splitlines()
                  if line.strip()
              ]
          result["posted_summary_comments"] = posted
          result_path.write_text(json.dumps(result, indent=2, ensure_ascii=False))
          PY

      - name: Replace line comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.body | contains("<!-- ai-pr-review-line -->")) | .id' |
          while read -r comment_id; do
            if [ -n "${comment_id}" ]; then
              gh api --method DELETE "repos/${REPO}/pulls/comments/${comment_id}" >/dev/null
            fi
          done

          python3 - <<'PY'
          import json
          from pathlib import Path
          comments = json.loads(Path("tmp/review/result.json").read_text()).get("review_comments", [])
          Path("tmp/review/line-comments.json").write_text(json.dumps(comments))
          PY

          jq -c '.[]' tmp/review/line-comments.json | while read -r item; do
            path=$(printf '%s' "${item}" | jq -r '.path')
            line=$(printf '%s' "${item}" | jq -r '.line')
            severity=$(printf '%s' "${item}" | jq -r '.severity')
            category=$(printf '%s' "${item}" | jq -r '.category')
            body=$(printf '%s' "${item}" | jq -r '["<!-- ai-pr-review-line -->"] + (.applied_rule_ids // [] | map("<!-- RuleId: " + . + " -->")) + ["[" + .severity + "/" + .category + "] " + .body] | join("\n")')
            gh api --method POST "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
              -f body="${body}" \
              -f commit_id="${HEAD_SHA}" \
              -f path="${path}" \
              -F line="${line}" \
              -f side="RIGHT" >/dev/null
          done

      - name: Upload review result to S3
        if: steps.s3-check.outputs.enabled == 'true'
        env:
          AI_REVIEW_S3_BUCKET: ${{ secrets.AI_REVIEW_S3_BUCKET }}
        run: |
          run_at=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          year=$(date -u +"%Y")
          month=$(date -u +"%m")
          day=$(date -u +"%d")
          aws s3 cp tmp/review/result.json \
            "s3://${AI_REVIEW_S3_BUCKET}/reviews/repo_partition=${REPO//\//_}/year=${year}/month=${month}/day=${day}/pr=${PR_NUMBER}/run=${run_at}.json"

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ai-review-${{ env.PR_NUMBER }}-${{ github.run_attempt }}
          path: tmp/review
          if-no-files-found: warn
