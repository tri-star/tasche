name: PR AI Review

on:
  pull_request_target:
    types:
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  pr-ai-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_REF: ${{ github.event.pull_request.head.ref }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      TRUSTED_REF: ${{ github.event.repository.default_branch }}
      SAME_REPO: ${{ github.event.pull_request.head.repo.full_name ==
        github.repository && 'true' || 'false' }}
    steps:
      - name: Parse ID Token
        id: parse_id_token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('sts.amazonaws.com')
            const [, payload] = token.split('.')
            const claimsJson = Buffer.from(payload, 'base64').toString('utf8')
            const claims = JSON.parse(claimsJson)
            core.info(`OIDC claims: ${JSON.stringify(claims, null, 2)}`)

      - name: Checkout trusted workflow base
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TRUSTED_REF }}
          fetch-depth: 0

      - name: Fetch exact base/head commits
        if: env.SAME_REPO == 'true'
        run: |
          git fetch --no-tags origin \
            "refs/heads/${BASE_REF}:refs/remotes/origin/pr-review-base" \
            "refs/heads/${HEAD_REF}:refs/remotes/origin/pr-review-head"
          git fetch --no-tags origin "${BASE_SHA}" "${HEAD_SHA}"
          git rev-parse --verify "${BASE_SHA}^{commit}"
          git rev-parse --verify "${HEAD_SHA}^{commit}"

      - name: Set up Node.js
        if: env.SAME_REPO == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Copilot CLI
        if: env.SAME_REPO == 'true'
        run: npm install -g @github/copilot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: env.SAME_REPO == 'true'
        run: python -m pip install pyyaml

      - name: Write PR body
        run: |
          mkdir -p tmp/review
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          body = event["pull_request"].get("body") or ""
          Path("tmp/review/pr-body.txt").write_text(body)
          PY

      - name: Build review context
        if: env.SAME_REPO == 'true'
        run: |
          python3 .github/skills/review-context/scripts/build_review_context.py \
            --base-ref "${BASE_REF}" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --trusted-ref "${TRUSTED_REF}" \
            --repo "${REPO}" \
            --head-repo "${HEAD_REPO}" \
            --pr-number "${PR_NUMBER}" \
            --title "${PR_TITLE}" \
            --body-file tmp/review/pr-body.txt \
            --author "${PR_AUTHOR}" \
            --output-dir tmp/review

      - name: Build Copilot prompt
        if: env.SAME_REPO == 'true'
        run: |
          python3 .github/scripts/build_pr_review_prompt.py \
            --metadata tmp/review/pr-metadata.json \
            --body-file tmp/review/pr-body.txt \
            --output tmp/review/prompt.txt

      - name: Run Copilot review
        if: env.SAME_REPO == 'true'
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot \
            -s \
            --no-ask-user \
            --agent=pr-review \
            --prompt "$(cat tmp/review/prompt.txt)" \
            --allow-tool='shell(git:diff), shell(git:show), shell(git:rev-parse), shell(rg:*), shell(cat:*), shell(sed:*), shell(ls:*)' \
            --secret-env-vars='COPILOT_GITHUB_TOKEN,GH_TOKEN,GITHUB_TOKEN' \
            > tmp/review/result.raw.txt

      - name: Create fallback result for fork PR
        if: env.SAME_REPO != 'true'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          result = {
              "verdict": "human-review",
              "confidence": 1,
              "reasons": [
                  "Fork PR は trusted workflow で PR head を安全に参照し切れないため、AI review を実行せず human-review とした。"
              ],
              "violated_docs": [],
              "referenced_paths": [".github/workflows/pr-ai-review.yml"],
              "review_comments": [],
          }
          Path("tmp/review/result.json").write_text(
              json.dumps(result, indent=2, ensure_ascii=False)
          )
          PY

      - name: Normalize review result
        if: env.SAME_REPO == 'true'
        run: |
          python3 .github/scripts/validate_pr_review_result.py \
            --input tmp/review/result.raw.txt \
            --output tmp/review/result.json

      - name: Render summary comment
        run: |
          python3 .github/scripts/render_pr_review_comment.py \
            --input tmp/review/result.json \
            --output tmp/review/summary-comment.md

      - name: Ensure AI review labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "ai-verdict:mergeable" --repo "${REPO}" --color "0e8a16" --description "AI verdict: mergeable" 2>/dev/null || true
          gh label create "ai-verdict:human-review" --repo "${REPO}" --color "d93f0b" --description "AI verdict: human review required" 2>/dev/null || true

      - name: Update verdict labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_labels=$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json labels --jq '.labels[].name')
          for label in ai-verdict:mergeable ai-verdict:human-review; do
            if printf '%s\n' "${current_labels}" | grep -qx "${label}"; then
              gh pr edit "${PR_NUMBER}" --repo "${REPO}" --remove-label "${label}"
            fi
          done

          verdict=$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("tmp/review/result.json").read_text())["verdict"])
          PY
          )

          if [ "${verdict}" = "mergeable" ]; then
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "ai-verdict:mergeable"
          else
            gh pr edit "${PR_NUMBER}" --repo "${REPO}" --add-label "ai-verdict:human-review"
          fi

      - name: Upsert summary comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          comment_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- ai-pr-review-summary -->")) | .id' | head -n 1)

          body=$(cat tmp/review/summary-comment.md)

          if [ -n "${comment_id}" ]; then
            gh api --method PATCH "repos/${REPO}/issues/comments/${comment_id}" -f body="${body}" >/dev/null
          else
            gh api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${body}" >/dev/null
          fi

      - name: Replace line comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${REPO}/pulls/${PR_NUMBER}/comments" --paginate \
            --jq '.[] | select(.body | contains("<!-- ai-pr-review-line -->")) | .id' |
          while read -r comment_id; do
            if [ -n "${comment_id}" ]; then
              gh api --method DELETE "repos/${REPO}/pulls/comments/${comment_id}" >/dev/null
            fi
          done

          python3 - <<'PY'
          import json
          from pathlib import Path
          comments = json.loads(Path("tmp/review/result.json").read_text()).get("review_comments", [])
          Path("tmp/review/line-comments.json").write_text(json.dumps(comments))
          PY

          jq -c '.[]' tmp/review/line-comments.json | while read -r item; do
            path=$(printf '%s' "${item}" | jq -r '.path')
            line=$(printf '%s' "${item}" | jq -r '.line')
            severity=$(printf '%s' "${item}" | jq -r '.severity')
            category=$(printf '%s' "${item}" | jq -r '.category')
            body=$(printf '%s' "${item}" | jq -r '"<!-- ai-pr-review-line -->\n[" + .severity + "/" + .category + "] " + .body')
            gh api --method POST "repos/${REPO}/pulls/${PR_NUMBER}/comments" \
              -f body="${body}" \
              -f commit_id="${{ github.event.pull_request.head.sha }}" \
              -f path="${path}" \
              -F line="${line}" \
              -f side="RIGHT" >/dev/null
          done

      - name: Check S3 upload config
        id: s3-check
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AI_REVIEW_S3_BUCKET: ${{ secrets.AI_REVIEW_S3_BUCKET }}
        run: |
          if [ "${SAME_REPO}" = "true" ] && [ -n "${AWS_ROLE_ARN}" ] && [ -n "${AI_REVIEW_S3_BUCKET}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.s3-check.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Upload review result to S3
        if: steps.s3-check.outputs.enabled == 'true'
        env:
          AI_REVIEW_S3_BUCKET: ${{ secrets.AI_REVIEW_S3_BUCKET }}
        run: |
          run_at=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          year=$(date -u +"%Y")
          month=$(date -u +"%m")
          day=$(date -u +"%d")
          aws s3 cp tmp/review/result.json \
            "s3://${AI_REVIEW_S3_BUCKET}/reviews/repo_partition=${REPO//\//_}/year=${year}/month=${month}/day=${day}/pr=${PR_NUMBER}/run=${run_at}.json"

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ai-review-${{ env.PR_NUMBER }}-${{ github.run_attempt }}
          path: tmp/review
          if-no-files-found: warn
