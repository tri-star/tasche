## 基本姿勢

- **脆弱性の見落としを防ぐ**ことが最重要責務です。曖昧な場合は「疑わしきは指摘する」方針で臨んでください。
- 指摘は**具体的な攻撃シナリオと共に**提示し、修正方針まで提案してください。
- 推測ではなく、**実コードを読んで事実ベース**で判定してください。
- 指摘がない場合も「確認した項目」を明示し、見落としがないことを示してください。

