version = 0.1

# 共通設定
[default.global.parameters]
stack_name = "tasche-backend"
region = "ap-southeast-1"

[dev.global.parameters]
region = "ap-southeast-1"

# dev 環境
[dev.deploy.parameters]
stack_name = "dev-tasche-backend"
region = "ap-southeast-1"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = "Env=dev AppEnv=development LogLevel=debug GoogleOAuthRedirectUris=https://dev.tasche.life/auth/callback CloudFrontDistributionId=E364RGE7EU1MJN CorsAllowOrigins=https://dev.tasche.life"
resolve_image_repos = true
resolve_s3 = true

[prod.global.parameters]
region = "ap-southeast-1"

# prod 環境
# CloudFrontDistributionId: frontend prod スタックの初回デプロイ後に判明する。
# 初回は frontend を先にデプロイし、CloudFormation Outputs の DistributionId を取得してここへ設定すること。
# 設定前は REPLACE_WITH_PROD_CLOUDFRONT_DISTRIBUTION_ID のままにしておく。
[prod.deploy.parameters]
stack_name = "prod-tasche-backend"
region = "ap-southeast-1"
capabilities = "CAPABILITY_NAMED_IAM"
confirm_changeset = false
fail_on_empty_changeset = false
parameter_overrides = "Env=prod AppEnv=production LogLevel=info GoogleOAuthRedirectUris=https://tasche.life/auth/callback CloudFrontDistributionId=E1P5DDXXMRM1IW CorsAllowOrigins=https://tasche.life"
resolve_image_repos = true
resolve_s3 = true
