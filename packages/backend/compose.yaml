services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tasche
      POSTGRES_USER: tasche
      POSTGRES_PASSWORD: tasche_dev_password
    ports:
      - "${DB_CONTAINER_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasche"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@db:5432/tasche
      TEST_DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@db:5432/tasche_test
      APP_ENV: local
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: "900"
      JWT_REFRESH_TOKEN_EXPIRES_SECONDS: "604800"
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      COOKIE_DOMAIN: ""
      AUTH_STUB_ENABLED: "true"
      AUTH_STUB_JWT_SECRET: ${AUTH_STUB_JWT_SECRET:-stub-secret-for-local}
      LOG_LEVEL: debug
    ports:
      - "${API_CONTAINER_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
      - ./openapi.json:/app/openapi.json
      - ./ruff.toml:/app/ruff.toml
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn tasche.main:app --host 0.0.0.0 --port 8000 --reload

  api-e2e:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@db:5432/tasche_test
      TEST_DATABASE_URL: postgresql+asyncpg://tasche:tasche_dev_password@db:5432/tasche_test
      APP_ENV: testing
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: "900"
      JWT_REFRESH_TOKEN_EXPIRES_SECONDS: "604800"
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      COOKIE_DOMAIN: ""
      AUTH_STUB_ENABLED: "true"
      AUTH_STUB_JWT_SECRET: ${AUTH_STUB_JWT_SECRET:-stub-secret-for-local}
      LOG_LEVEL: debug
    ports:
      - "${E2E_API_CONTAINER_PORT:-8001}:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./scripts:/app/scripts
      - ./alembic.ini:/app/alembic.ini
      - ./openapi.json:/app/openapi.json
      - ./ruff.toml:/app/ruff.toml
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn tasche.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
