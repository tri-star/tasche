AWSTemplateFormatVersion: "2010-09-09"
Description: |
  Tasche Frontend - S3 (静的ホスティング) + CloudFront + 独自ドメイン (オプション).
  /api/* は Backend Lambda Function URL にルーティングして同一オリジン運用とする。
  Domain が空の場合は CloudFront デフォルトドメインで動作する。
  詳細は docs/deploy/manual-deploy.md を参照。

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  BackendFunctionUrl:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /tasche/dev/sam/backend-function-url
    Description: |
      Backend Lambda Function URL のホスト名を格納した SSM パラメータのパス.
      Backend スタックのデプロイ時に /tasche/<Env>/sam/backend-function-url へ自動格納される.
  Domain:
    Type: String
    Default: ""
    Description: |
      CloudFront に割り当てる独自ドメイン名.
      空の場合は CloudFront デフォルトドメイン (xxx.cloudfront.net) を使用する。
  AcmCertificateArn:
    Type: String
    Default: ""
    Description: |
      ACM 証明書 ARN (us-east-1). Domain を指定する場合は必須。
      空の場合は CloudFront デフォルト証明書を使用する。

Conditions:
  HasCustomDomain:
    Fn::Not:
      - Fn::Equals:
          - !Ref Domain
          - ""

Resources:
  # ----------------------------------------------------------------------------
  # 静的ファイル配信用 S3 バケット
  # ----------------------------------------------------------------------------
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Env}-tasche-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  # ----------------------------------------------------------------------------
  # Origin Access Control: S3 への CloudFront からのアクセスを認可
  # ----------------------------------------------------------------------------
  S3OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Env}-tasche-frontend-s3-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Lambda Function URL 用 OAC (CloudFront → Function URL の sigv4 署名)
  # Lambda Function URL に対する CloudFront OAC は 2024 年に GA
  # アプリの Bearer Authorization ヘッダーがある場合はそれを origin へ通し、
  # Authorization が無いリクエストのみ CloudFront が SigV4 署名する。
  LambdaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Env}-tasche-frontend-lambda-oac"
        OriginAccessControlOriginType: lambda
        SigningBehavior: no-override
        SigningProtocol: sigv4

  # OAC no-override で viewer の Authorization を origin に通すため、
  # Authorization ヘッダーを CachePolicy 側にも含める。
  # CloudFront は TTL が完全に 0 の CachePolicy ではヘッダー指定を拒否するため、
  # DefaultTTL/MinTTL は 0 のまま MaxTTL だけ 1 秒に抑える。
  ApiNoCacheWithAuthorizationPolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${Env}-tasche-api-no-cache-with-authorization"
        Comment: !Sub "${Env} Tasche API: no cache, forward Authorization for OAC no-override"
        DefaultTTL: 0
        MaxTTL: 1
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: false
          EnableAcceptEncodingGzip: false
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - Authorization
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  # ----------------------------------------------------------------------------
  # CloudFront Distribution
  # ----------------------------------------------------------------------------
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${Env}-tasche-frontend"
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Aliases: !If
          - HasCustomDomain
          - - !Ref Domain
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            MinimumProtocolVersion: TLSv1.2_2021
            SslSupportMethod: sni-only
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: s3-assets
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt S3OriginAccessControl.Id
          - Id: backend-lambda
            DomainName: !Ref BackendFunctionUrl
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
            OriginAccessControlId: !GetAtt LambdaOriginAccessControl.Id
        DefaultRootObject: index.html
        DefaultCacheBehavior:
          TargetOriginId: s3-assets
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          # CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: backend-lambda
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            # DefaultTTL 0 + MaxTTL 1 + Authorization を cache/origin key に含めるカスタムポリシー
            CachePolicyId: !Ref ApiNoCacheWithAuthorizationPolicy
            # AllViewerExceptHostHeader (Authorization/Cookie を含む全ヘッダ転送, Host は除外)
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        # SPA フォールバック: 静的アセットの 404 を index.html に置換
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  # ----------------------------------------------------------------------------
  # S3 バケットポリシー: CloudFront OAC のみアクセス許可
  # ----------------------------------------------------------------------------
  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AssetsBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  AssetsBucketName:
    Description: 静的ファイルを配置する S3 バケット名 (CI からの aws s3 sync 先)
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub "${Env}-tasche-frontend-bucket"
  DistributionId:
    Description: CloudFront Distribution ID (CI からの cache invalidation 用)
    Value: !Ref Distribution
    Export:
      Name: !Sub "${Env}-tasche-frontend-distribution-id"
  DistributionDomainName:
    Description: CloudFront のデフォルトドメイン名 (動作確認 / Route53 alias 用)
    Value: !GetAtt Distribution.DomainName
  CustomDomain:
    Description: 設定済みカスタムドメイン
    Value: !Ref Domain
