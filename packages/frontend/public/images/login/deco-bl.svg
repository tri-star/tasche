<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380" fill="none">
  <!-- Plant behind clipboard -->
  <!-- Stem -->
  <path d="M 80 380 C 78 320, 82 240, 80 100"
        stroke="#7FA888" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Leaves alternating -->
  <path d="M 80 320 Q 30 305, 22 270 Q 62 285, 80 320 Z"
        fill="#B7D8BE" stroke="#8BB592" stroke-width="1.5"/>
  <path d="M 80 280 Q 130 265, 138 230 Q 98 245, 80 280 Z"
        fill="#B7D8BE" stroke="#8BB592" stroke-width="1.5"/>
  <path d="M 80 230 Q 28 215, 20 178 Q 60 195, 80 230 Z"
        fill="#C5DEB5" stroke="#8BB592" stroke-width="1.5"/>
  <path d="M 80 185 Q 132 170, 140 133 Q 100 150, 80 185 Z"
        fill="#C5DEB5" stroke="#8BB592" stroke-width="1.5"/>
  <path d="M 80 138 Q 38 124, 34 92 Q 68 106, 80 138 Z"
        fill="#B7D8BE" stroke="#8BB592" stroke-width="1.5"/>
  <path d="M 80 100 Q 118 86, 122 58 Q 90 72, 80 100 Z"
        fill="#B7D8BE" stroke="#8BB592" stroke-width="1.5"/>
  <!-- Veins -->
  <path d="M 76 316 Q 50 305, 28 276" stroke="#8BB592" stroke-width="1" fill="none" opacity=".7"/>
  <path d="M 84 276 Q 110 265, 132 238" stroke="#8BB592" stroke-width="1" fill="none" opacity=".7"/>
  <path d="M 76 226 Q 50 214, 26 184" stroke="#8BB592" stroke-width="1" fill="none" opacity=".7"/>
  <path d="M 84 181 Q 112 168, 136 140" stroke="#8BB592" stroke-width="1" fill="none" opacity=".7"/>

  <!-- Clipboard body shadow -->
  <rect x="60" y="166" width="186" height="248" rx="10" fill="#000" opacity=".05"
        transform="rotate(-6 60 166) translate(5 10)"/>
  <!-- Clipboard board -->
  <g transform="rotate(-6 148 290)">
    <rect x="60" y="166" width="186" height="248" rx="10"
          fill="#F4EBD2" stroke="#D6B27C" stroke-width="3"/>
    <!-- Clip base -->
    <rect x="117" y="160" width="72" height="28" rx="5"
          fill="#C8CED1" stroke="#9AA3A8" stroke-width="2"/>
    <!-- Clip top -->
    <rect x="130" y="152" width="46" height="18" rx="4"
          fill="#E0E4E6" stroke="#9AA3A8" stroke-width="2"/>
    <circle cx="153" cy="175" r="3" fill="#9AA3A8"/>

    <!-- Row 1: checked -->
    <rect x="80" y="220" width="22" height="22" rx="4"
          fill="#fff" stroke="#7FBF8F" stroke-width="2.5"/>
    <path d="M 85 231 L 90 236 L 98 226"
          stroke="#5FAA78" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="112" y1="231" x2="228" y2="231"
          stroke="#D6B27C" stroke-width="2" stroke-linecap="round" opacity=".6"/>

    <!-- Row 2: checked -->
    <rect x="80" y="264" width="22" height="22" rx="4"
          fill="#fff" stroke="#7FBF8F" stroke-width="2.5"/>
    <path d="M 85 275 L 90 280 L 98 270"
          stroke="#5FAA78" stroke-width="2.8" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="112" y1="275" x2="228" y2="275"
          stroke="#D6B27C" stroke-width="2" stroke-linecap="round" opacity=".6"/>

    <!-- Row 3: unchecked -->
    <rect x="80" y="308" width="22" height="22" rx="4"
          fill="#fff" stroke="#7FBF8F" stroke-width="2.5"/>
    <line x1="112" y1="319" x2="228" y2="319"
          stroke="#D6B27C" stroke-width="2" stroke-linecap="round" opacity=".6"/>

    <!-- Row 4: unchecked -->
    <rect x="80" y="352" width="22" height="22" rx="4"
          fill="#fff" stroke="#7FBF8F" stroke-width="2.5"/>
    <line x1="112" y1="363" x2="210" y2="363"
          stroke="#D6B27C" stroke-width="2" stroke-linecap="round" opacity=".6"/>
  </g>

  <!-- Sparkles near left side -->
  <path d="M 195 125 C 195 130, 198 133, 203 133 C 198 133, 195 136, 195 141
           C 195 136, 192 133, 187 133 C 192 133, 195 130, 195 125 Z"
        fill="#E8B866"/>
  <path d="M 168 96 C 168 99, 170 101, 173 101 C 170 101, 168 103, 168 106
           C 168 103, 166 101, 163 101 C 166 101, 168 99, 168 96 Z"
        fill="#E8B866" opacity=".8"/>
  <path d="M 230 108 C 230 112, 233 115, 237 115 C 233 115, 230 118, 230 122
           C 230 118, 227 115, 223 115 C 227 115, 230 112, 230 108 Z"
        fill="#E8B866" opacity=".7"/>
</svg>
